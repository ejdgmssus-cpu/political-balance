*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F5;--card:#FFFFFF;--nav:#FFFFFF;
  --text:#111111;--text2:#333333;--text3:#555555;--muted:#999999;--muted2:#BBBBBB;
  --border:rgba(0,0,0,0.06);--sep:rgba(0,0,0,0.08);
  --input:#F0F0F0;--ghost:rgba(0,0,0,0.03);
  --accent:#333333;
  --blue:#1A6DFF;--red:#E8363A;--green:#22A861;
  --left-color:#1A6DFF;--right-color:#E8363A;
  --left-bg:rgba(26,109,255,0.05);--right-bg:rgba(232,54,58,0.05);
  --summary-bg:rgba(90,80,220,0.05);--common-bg:rgba(34,168,97,0.05);
  --breaking:#E8363A;
  --radius:12px;--radius-sm:8px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0A0A0A;--card:#161616;--nav:#111111;
  --text:#EEEEEE;--text2:#CCCCCC;--text3:#999999;--muted:#666666;--muted2:#444444;
  --border:rgba(255,255,255,0.06);--sep:rgba(255,255,255,0.08);
  --input:#1C1C1C;--ghost:rgba(255,255,255,0.04);
  --accent:#EEEEEE;
  --left-bg:rgba(26,109,255,0.1);--right-bg:rgba(232,54,58,0.1);
  --summary-bg:rgba(90,80,220,0.08);--common-bg:rgba(34,168,97,0.08);
}}
body{font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;letter-spacing:-0.01em}
input,button,textarea{font-family:inherit;letter-spacing:-0.01em}
input::placeholder,textarea::placeholder{color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.hide-scroll::-webkit-scrollbar{display:none}.hide-scroll{-ms-overflow-style:none;scrollbar-width:none}
.icon{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
</style>
</head>

<div id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://rwcmthtyisuqkisxufst.supabase.co';
const SUPABASE_ANON='sb_publishable_WFWzeNbNgzx5Q7QgcnSNYg_6KMsd7NX';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

const S={tab:'home',articles:[],loading:!1,sel:null,comments:[],cmtLoading:!1,sq:'',sf:!1,
  sources:['전체','정치','경제','사회','외교','부동산','에너지','노동'],

// Auth
async function initAuth(){
  const{data:{session}}=await sb.auth.getSession();
  S.user=session?.user||null;
  sb.auth.onAuthStateChange((e,session)=>{S.user=session?.user||null;render();});
  render();
}
async function loginKakao(){
  const redirectTo=window.location.origin;
  const url=`${SUPABASE_URL}/auth/v1/authorize?provider=kakao&redirect_to=${encodeURIComponent(redirectTo)}&scopes=profile_nickname,profile_image`;
  window.location.href=url;
}
async function loginGoogle(){
  await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin}});
}
async function logout(){
  await sb.auth.signOut();
  S.user=null;render();
}

const CAT_COLORS={정치:['#5A50DC','rgba(90,80,220,0.08)'],경제:['#22A861','rgba(34,168,97,0.08)'],외교:['#E88C1A','rgba(232,140,26,0.08)'],부동산:['#1A6DFF','rgba(26,109,255,0.08)'],사회:['#9B59B6','rgba(155,89,182,0.08)'],에너지:['#E8363A','rgba(232,54,58,0.08)'],노동:['#E88C1A','rgba(232,140,26,0.08)'],기타:['#999','rgba(153,153,153,0.08)']};

const IC={
  home:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  search:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,

  user:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  back:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  eye:`<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>`,

  bmark:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>`,
  cmt:`<svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd"/></svg>`,
};

function tAgo(d){const s=Math.floor((new Date()-new Date(d))/1000);if(s<60)return'방금 전';if(s<3600)return`${Math.floor(s/60)}분 전`;if(s<86400)return`${Math.floor(s/3600)}시간 전`;return`${Math.floor(s/86400)}일 전`}
function h(t,a={},...c){const e=document.createElement(t);for(const[k,v]of Object.entries(a)){if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on')){if(typeof v==='function')e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);}else if(k==='innerHTML')e.innerHTML=v;else if(k==='className')e.className=v;else e.setAttribute(k,v)}for(const ch of c.flat()){if(ch==null)continue;e.appendChild(typeof ch==='string'?document.createTextNode(ch):ch)}return e}
function fv(n){if(!n)return'0';if(n>=10000)return(n/10000).toFixed(1)+'만';if(n>=1000)return(n/1000).toFixed(1)+'K';return String(n)}
const SRC_MAP={'조선일보':'chosun.com','중앙일보':'joongang.co.kr','동아일보':'donga.com','한겨레':'hani.co.kr','경향신문':'khan.co.kr','한국일보':'hankookilbo.com','국민일보':'kmib.co.kr','세계일보':'segye.com','문화일보':'munhwa.com','KBS':'kbs.co.kr','MBC':'imbc.com','SBS':'sbs.co.kr','JTBC':'jtbc.co.kr','MBN':'mbn.co.kr','TV조선':'tvchosun.com','채널A':'channela.com','YTN':'ytn.co.kr','한국경제':'hankyung.com','매일경제':'mk.co.kr','서울경제':'sedaily.com','머니투데이':'mt.co.kr','이데일리':'edaily.co.kr','파이낸셜뉴스':'fnnews.com','아시아경제':'asiae.co.kr','헤럴드경제':'herald.co.kr','연합뉴스':'yna.co.kr','뉴시스':'newsis.com','뉴스1':'news1.kr'};
const SRC_NAME={newsfreezone:'뉴스프리존',idaegu:'아이대구',dkilbo:'대구일보',inews24:'아이뉴스24',newspim:'뉴스핌',nocutnews:'노컷뉴스',dailyan:'데일리안',edaily:'이데일리',newsis:'뉴시스',news1:'뉴스1',ajunews:'아주경제',newdaily:'뉴데일리',kukinews:'쿠키뉴스'};
function fixSrc(s){return SRC_NAME[s]||s;}
function srcLogo(name){const n=fixSrc(name);const d=SRC_MAP[n];return d?`https://www.google.com/s2/favicons?domain=${d}&sz=32`:null;}

async function loadArticles(cat,search,sort){S.loading=!0;render();try{let u='/api/articles?limit=30';if(cat&&cat!=='전체')u+=`&category=${encodeURIComponent(cat)}`;if(search)u+=`&search=${encodeURIComponent(search)}`;if(sort)u+=`&sort=${sort}`;const r=await fetch(u);S.articles=r.ok?await r.json():[];}catch(e){S.articles=[];}S.loading=!1;render();}
function addView(id){fetch('/api/articles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})}).catch(()=>{});}
function vote(id,side){const key='voted_'+id;if(localStorage.getItem(key))return;localStorage.setItem(key,side);fetch('/api/articles',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,action:'vote',side})}).catch(()=>{});if(S.sel){S.sel['vote_'+side]=(S.sel['vote_'+side]||0)+1;}render();}
async function loadCmt(id){S.cmtLoading=!0;render();try{const r=await fetch(`/api/comments?article_id=${id}`);S.comments=r.ok?await r.json():[];}catch(e){S.comments=[];}S.cmtLoading=!1;render();}
function getNick(){return localStorage.getItem('dasi_nick')||S.user?.user_metadata?.full_name||S.user?.user_metadata?.name||S.user?.email?.split('@')[0]||'익명';}
function setNick(n){localStorage.setItem('dasi_nick',n);}
async function postCmt(id,t){if(!S.user)return;try{await fetch('/api/comments',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({article_id:id,text:t,username:getNick()})});S.stats.comments++;loadCmt(id);}catch(e){}}
async function loadMyCmt(){S.myCmtLoading=!0;render();try{const r=await fetch(`/api/comments?username=${encodeURIComponent(getNick())}`);S.myComments=r.ok?await r.json():[];}catch(e){S.myComments=[];}S.myCmtLoading=!1;render();}

function rHeader(){
  return h('div',{style:{padding:'52px 0 0',background:'var(--nav)',borderBottom:'1px solid var(--sep)'}},
    h('div',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'0 20px 12px'}},
      h('img',{src:'/logo.png',style:{width:'32px',height:'32px',borderRadius:'8px'}})),
    h('div',{className:'hide-scroll',style:{display:'flex',overflowX:'auto',paddingLeft:'20px',paddingRight:'20px'}},
      ...S.sources.map(s=>h('button',{style:{padding:'10px 14px',border:'none',background:'transparent',fontSize:'13px',fontWeight:S.ac===s?'700':'500',color:S.ac===s?'var(--text)':'var(--muted)',cursor:'pointer',whiteSpace:'nowrap',borderBottom:S.ac===s?'2px solid var(--text)':'2px solid transparent',transition:'all 0.15s'},
        onClick:()=>{S.ac=s;loadArticles(s);}},s)))
  );
}

function rCard(a,i){
  const cc=CAT_COLORS[a.category]||CAT_COLORS['기타'];
  const has=a.summary&&!['AI 분석 준비 중','분석 중'].includes(a.summary);

  return h('div',{style:{background:'var(--card)',padding:'16px 20px',borderBottom:'1px solid var(--border)',cursor:'pointer',animation:`fadeUp 0.3s ease ${i*0.03}s both`},
    onClick:()=>{S.sel=a;S.stats.read++;S.stanceOpen=!1;addView(a.id);loadCmt(a.id);render();}},
    h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}},
      srcLogo(a.source)?h('img',{src:srcLogo(a.source),style:{width:'16px',height:'16px',borderRadius:'3px'},onError:e=>{e.target.style.display='none';}}):null,
      h('span',{style:{fontSize:'12px',fontWeight:'700',color:'var(--text)'}},fixSrc(a.source)||a.category),
      h('span',{style:{fontSize:'11px',color:'var(--muted)'}},`· ${a.category}`),
      brk?h('span',{style:{fontSize:'10px',fontWeight:'700',color:'var(--breaking)'}},'· 속보'):null,

      a.thumbnail?h('div',{style:{width:'80px',height:'80px',borderRadius:'var(--radius-sm)',overflow:'hidden',flexShrink:0,background:'var(--ghost)'}},
        h('img',{src:a.thumbnail,style:{width:'100%',height:'100%',objectFit:'cover'},onError:e=>{e.target.parentElement.style.display='none';}})):null),
    has?h('div',{style:{fontSize:'13px',color:'var(--text3)',lineHeight:'1.5',overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',WebkitLineClamp:'2',WebkitBoxOrient:'vertical'}},a.summary):null
  );
}

  const a=S.sel;const cc=CAT_COLORS[a.category]||CAT_COLORS['기타'];
  const rs=s=>{try{return JSON.parse(s)}catch{return[s]}};

      h('div',{style:{marginLeft:'auto'},innerHTML:IC.bmark})),
    h('div',{style:{padding:'16px 20px 0'}},
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px'}},
        srcLogo(a.source)?h('img',{src:srcLogo(a.source),style:{width:'16px',height:'16px',borderRadius:'3px'},onError:e=>{e.target.style.display='none';}}):null,

    has&&!S.stanceOpen?h('button',{style:{margin:'16px 20px',padding:'14px',width:'calc(100% - 40px)',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--card)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',fontSize:'14px',fontWeight:'600',color:'var(--text)'},

      h('span',{style:{fontSize:'16px'}},'👀'),h('span',{},'다른 시각도 있어요')):null,
    has&&S.stanceOpen?h('div',{style:{margin:'12px 20px 0',animation:'fadeUp 0.3s ease'}},

        rSide(a.conservative_stance,rs(a.conservative_reasons),a.conservative_concern,'보수','var(--right-color)','var(--right-bg)')),
      h('div',{style:{padding:'14px 16px',borderRadius:'var(--radius)',background:'var(--common-bg)',display:'flex',alignItems:'flex-start',gap:'8px'}},

        h('div',{},

      h('button',{style:{flex:1,padding:'10px 14px',borderRadius:'20px',border:'1px solid var(--border)',background:'var(--input)',fontSize:'13px',color:'var(--muted)',textAlign:'left',cursor:'pointer'},onClick:()=>{S.tab='profile';S.sel=null;render();}},'로그인하고 댓글을 남겨보세요'),
      S.user?h('button',{innerHTML:IC.send,style:{width:'38px',height:'38px',borderRadius:'50%',border:'none',background:'var(--blue)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,color:'#FFF'},
        onClick:()=>{const i=document.getElementById('cmt');if(i&&i.value.trim()){postCmt(a.id,i.value.trim());i.value='';}}}):null)
  );
}

function rSide(stance,reasons,concern,label,color,bg){
  const c=color==='var(--left-color)'?'#1A6DFF':'#E8363A';
  return h('div',{style:{background:bg,borderRadius:'var(--radius)',padding:'14px',borderLeft:`3px solid ${c}`}},
    h('div',{style:{fontSize:'12px',fontWeight:'700',color,marginBottom:'6px'}},label),
    h('div',{style:{fontSize:'13px',fontWeight:'500',color:'var(--text)',lineHeight:'1.65'}},stance)
  );
}

function rVote(a){
  const vp=a.vote_progressive||0, vc=a.vote_conservative||0;
  const total=vp+vc;
  const pPct=total>0?Math.round(vp/total*100):50;
  const cPct=100-pPct;
  const voted=localStorage.getItem('voted_'+a.id);
  return h('div',{style:{marginTop:'10px',padding:'14px 16px',borderRadius:'var(--radius)',background:'var(--card)',border:'1px solid var(--border)'}},
    h('div',{style:{fontSize:'13px',fontWeight:'700',marginBottom:'10px',textAlign:'center'}},'이 이슈, 당신의 생각은?'),
    voted?
      h('div',{},
        h('div',{style:{display:'flex',height:'32px',borderRadius:'var(--radius-sm)',overflow:'hidden',marginBottom:'6px'}},
          h('div',{style:{width:`${pPct}%`,background:'var(--left-color)',display:'flex',alignItems:'center',justifyContent:'center',color:'#FFF',fontSize:'11px',fontWeight:'700',transition:'width 0.5s'}},pPct>10?`${pPct}%`:''),
          h('div',{style:{width:`${cPct}%`,background:'var(--right-color)',display:'flex',alignItems:'center',justifyContent:'center',color:'#FFF',fontSize:'11px',fontWeight:'700',transition:'width 0.5s'}},cPct>10?`${cPct}%`:'')),
        h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'var(--muted)'}},
          h('span',{},`진보 시각 공감 ${vp}명`),
          h('span',{},`보수 시각 공감 ${vc}명`)))
    :
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
        h('button',{style:{padding:'12px',borderRadius:'var(--radius-sm)',border:'1.5px solid var(--left-color)',background:'var(--left-bg)',color:'var(--left-color)',fontSize:'13px',fontWeight:'700',cursor:'pointer'},
          onClick:e=>{e.stopPropagation();vote(a.id,'progressive');}},'진보 시각에 공감'),
        h('button',{style:{padding:'12px',borderRadius:'var(--radius-sm)',border:'1.5px solid var(--right-color)',background:'var(--right-bg)',color:'var(--right-color)',fontSize:'13px',fontWeight:'700',cursor:'pointer'},
          onClick:e=>{e.stopPropagation();vote(a.id,'conservative');}},'보수 시각에 공감'))
  );
}

function rSearch(){
  return h('div',{style:{padding:'52px 20px 100px',background:'var(--bg)',minHeight:'100vh'}},
    h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'20px'}},
      h('button',{innerHTML:IC.back,style:{width:'32px',height:'32px',border:'none',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)'},onClick:()=>{S.tab='home';render();}}),
      h('h2',{style:{fontSize:'20px',fontWeight:'800'}},'검색')),
    h('div',{style:{display:'flex',alignItems:'center',gap:'8px',background:'var(--input)',borderRadius:'var(--radius)',padding:'0 14px',marginBottom:'20px',border:S.sf?'1.5px solid var(--blue)':'1.5px solid transparent'}},
      h('span',{innerHTML:IC.search,style:{color:'var(--muted)',flexShrink:0}}),
      h('input',{placeholder:'키워드로 검색',style:{flex:1,padding:'12px 0',border:'none',outline:'none',fontSize:'14px',background:'transparent',color:'var(--text)'},
        onFocus:()=>{S.sf=!0;render();},onBlur:()=>{S.sf=!1;},onInput:e=>{S.sq=e.target.value;},
        onKeydown:e=>{if(e.key==='Enter'&&S.sq.trim()){loadArticles(null,S.sq);S.tab='home';S.ac='전체';render();}}})),
    h('div',{style:{fontSize:'12px',fontWeight:'600',color:'var(--muted)',marginBottom:'10px'}},'추천 키워드'),
    h('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px'}},
      ...['대선','부동산','의대','반도체','한미동맹','탄핵','원전','최저임금','검찰','기후'].map(kw=>
        h('button',{style:{padding:'8px 16px',borderRadius:'20px',border:'1px solid var(--border)',background:'var(--card)',color:'var(--text)',fontSize:'13px',fontWeight:'500',cursor:'pointer'},
          onClick:()=>{S.sq=kw;loadArticles(null,kw);S.tab='home';S.ac='전체';render();}},kw)))
  );
}

function rTrending(){
  const sorted=[...S.articles].sort((a,b)=>(b.view_count||0)-(a.view_count||0));
  return h('div',{style:{padding:'52px 0 100px'}},
    h('div',{style:{padding:'0 20px 14px'}},
      h('h2',{style:{fontSize:'20px',fontWeight:'800',marginBottom:'3px'}},'핫이슈'),
      h('p',{style:{fontSize:'12px',color:'var(--muted)'}},'조회수 순')),
    sorted.length===0?h('div',{style:{textAlign:'center',padding:'50px',color:'var(--muted)',fontSize:'13px'}},'뉴스를 불러오는 중'):null,
    ...sorted.map((n,i)=>{
      const cc=CAT_COLORS[n.category]||CAT_COLORS['기타'];
      return h('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'14px 20px',cursor:'pointer',borderBottom:'1px solid var(--border)',animation:`fadeUp 0.25s ease ${i*0.03}s both`},
        onClick:()=>{S.sel=n;S.stats.read++;S.stanceOpen=!1;addView(n.id);loadCmt(n.id);render();}},
        h('div',{style:{width:'28px',height:'28px',borderRadius:'var(--radius-sm)',background:i<3?['var(--red)','#E88C1A','var(--muted)'][i]:'var(--ghost)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'12px',fontWeight:'800',color:i<3?'#FFF':'var(--muted)',flexShrink:0}},`${i+1}`),
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{style:{fontSize:'13.5px',fontWeight:'700',lineHeight:'1.5',overflow:'hidden',textOverflow:'ellipsis',display:'-webkit-box',WebkitLineClamp:'2',WebkitBoxOrient:'vertical'}},n.title),
          h('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'var(--muted)',marginTop:'4px'}},
            h('span',{style:{fontWeight:'600',color:cc[0]}},n.category),h('span',{},'·'),h('span',{},fixSrc(n.source)),n.view_count?h('span',{},`· 조회 ${fv(n.view_count)}`):null)))})
  );
}

function rProfile(){
  if(!S.user) return rLoginPage();
  const nick=getNick();
  if(!localStorage.getItem('dasi_nick')) return rSetupNick();
  return h('div',{style:{padding:'52px 20px 100px'}},
    // 프로필 헤더
    h('div',{style:{textAlign:'center',marginBottom:'24px'}},
      h('div',{style:{width:'64px',height:'64px',borderRadius:'50%',margin:'0 auto 12px',background:'linear-gradient(135deg,var(--blue),var(--green))',display:'flex',alignItems:'center',justifyContent:'center',color:'#FFF',fontSize:'24px',fontWeight:'800'}},nick[0]),
      h('h2',{style:{fontSize:'18px',fontWeight:'800'}},nick)),
    // 닉네임 변경
    h('div',{style:{background:'var(--card)',borderRadius:'var(--radius)',padding:'14px',border:'1px solid var(--border)',marginBottom:'12px',display:'flex',alignItems:'center',gap:'8px'}},
      h('input',{id:'nickInput',placeholder:'닉네임 변경',value:nick,style:{flex:1,padding:'8px 12px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)',background:'var(--input)',fontSize:'13px',color:'var(--text)',outline:'none'}}),
      h('button',{style:{padding:'8px 16px',borderRadius:'var(--radius-sm)',border:'none',background:'var(--blue)',color:'#FFF',fontSize:'12px',fontWeight:'700',cursor:'pointer'},
        onClick:()=>{const v=document.getElementById('nickInput')?.value?.trim();if(v){setNick(v);render();}}},'변경')),
    // 통계
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'20px'}},
      ...[{l:'읽은 기사',v:S.stats.read},{l:'남긴 댓글',v:S.stats.comments}].map(s=>
        h('div',{style:{background:'var(--card)',borderRadius:'var(--radius)',padding:'16px',textAlign:'center',border:'1px solid var(--border)'}},
          h('div',{style:{fontSize:'20px',fontWeight:'800',marginBottom:'2px'}},s.v),
          h('div',{style:{fontSize:'10px',color:'var(--muted)',fontWeight:'500'}},s.l)))),
    // 내 댓글
    h('div',{style:{marginBottom:'20px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
        h('span',{style:{fontSize:'14px',fontWeight:'700'}},'내가 쓴 댓글'),
        h('button',{style:{fontSize:'12px',color:'var(--blue)',border:'none',background:'transparent',cursor:'pointer',fontWeight:'600'},onClick:loadMyCmt},'새로고침')),
      S.myCmtLoading?h('div',{style:{textAlign:'center',padding:'20px',color:'var(--muted)',fontSize:'13px'}},'불러오는 중...'):null,
      ...S.myComments.map(c=>h('div',{style:{background:'var(--card)',borderRadius:'var(--radius)',padding:'12px 14px',border:'1px solid var(--border)',marginBottom:'6px'}},
        h('div',{style:{fontSize:'13px',lineHeight:'1.6',color:'var(--text)'}},c.text),
        h('div',{style:{fontSize:'11px',color:'var(--muted)',marginTop:'6px'}},tAgo(c.created_at)))),
      S.myComments.length===0&&!S.myCmtLoading?h('div',{style:{textAlign:'center',padding:'24px',color:'var(--muted)',fontSize:'13px',background:'var(--card)',borderRadius:'var(--radius)',border:'1px solid var(--border)'}},'아직 댓글이 없어요'):null),
    // 로그아웃
    h('button',{style:{width:'100%',padding:'14px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--card)',fontSize:'14px',fontWeight:'500',color:'var(--red)',cursor:'pointer'},
      onClick:logout},'로그아웃')
  );
}

function rSetupNick(){
  return h('div',{style:{padding:'52px 20px 100px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'70vh'}},
    h('div',{style:{width:'64px',height:'64px',borderRadius:'50%',marginBottom:'20px',background:'linear-gradient(135deg,var(--blue),var(--green))',display:'flex',alignItems:'center',justifyContent:'center',color:'#FFF',fontSize:'28px',fontWeight:'800'}},'?'),
    h('h2',{style:{fontSize:'20px',fontWeight:'800',marginBottom:'6px'}},'닉네임을 정해주세요'),
    h('p',{style:{fontSize:'13px',color:'var(--muted)',marginBottom:'30px'}},'댓글에 표시될 이름이에요'),
    h('input',{id:'setupNick',placeholder:'닉네임 입력',style:{width:'100%',maxWidth:'300px',padding:'14px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--input)',fontSize:'15px',color:'var(--text)',outline:'none',textAlign:'center',marginBottom:'16px'}}),
    h('button',{style:{width:'100%',maxWidth:'300px',padding:'14px',borderRadius:'var(--radius)',border:'none',background:'var(--blue)',color:'#FFF',fontSize:'15px',fontWeight:'700',cursor:'pointer'},
      onClick:()=>{const v=document.getElementById('setupNick')?.value?.trim();if(v){setNick(v);render();}}},'시작하기'));
}

function rLoginPage(){
  return h('div',{style:{padding:'52px 20px 100px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'70vh'}},
    h('img',{src:'/logo.png',style:{width:'80px',height:'80px',borderRadius:'20px',marginBottom:'20px'}}),
    h('h2',{style:{fontSize:'22px',fontWeight:'800',marginBottom:'6px'}},'다시 DASI'),
    h('p',{style:{fontSize:'13px',color:'var(--muted)',marginBottom:'40px'}},'다시, 다른 시각으로'),
    h('button',{style:{width:'100%',maxWidth:'300px',padding:'14px',borderRadius:'var(--radius)',border:'none',background:'#FEE500',fontSize:'14px',fontWeight:'700',color:'#191919',cursor:'pointer',marginBottom:'12px',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'},
      onClick:loginKakao},
      h('span',{style:{fontSize:'18px'}},'💬'),h('span',{},'카카오로 시작하기')),
    h('button',{style:{width:'100%',maxWidth:'300px',padding:'14px',borderRadius:'var(--radius)',border:'1px solid var(--border)',background:'var(--card)',fontSize:'14px',fontWeight:'600',color:'var(--text)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px'},
      onClick:loginGoogle},
      h('span',{style:{fontSize:'16px'}},'G'),h('span',{},'Google로 시작하기'))
  );
}

function rNav(){
  const tabs=[{k:'home',i:'home',l:'뉴스'},{k:'trending',i:'trend',l:'핫이슈'},{k:'search',i:'search',l:'검색'},{k:'profile',i:'user',l:'내 정보'}];
  return h('div',{style:{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'430px',background:'var(--nav)',borderTop:'1px solid var(--sep)',display:'flex',justifyContent:'space-around',padding:'6px 0 28px',zIndex:50}},
    ...tabs.map(t=>h('button',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',border:'none',background:'transparent',cursor:'pointer',padding:'4px 0',minWidth:'56px'},
      onClick:()=>{S.tab=t.k;S.sel=null;if(t.k==='home')loadArticles(S.ac);if(t.k==='trending')loadArticles('전체',null,'views');render();}},
      h('span',{innerHTML:IC[t.i],style:{color:S.tab===t.k?'var(--text)':'var(--muted)',opacity:S.tab===t.k?1:0.4}}),
      h('span',{style:{fontSize:'10px',fontWeight:S.tab===t.k?'700':'400',color:S.tab===t.k?'var(--text)':'var(--muted)'}},t.l))))
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(S.sel){app.appendChild(rDetail());return;}
  if(S.tab==='home'){
    app.appendChild(rHeader());
    const list=h('div',{style:{paddingBottom:'100px'}});
    if(S.loading)list.appendChild(h('div',{style:{textAlign:'center',padding:'50px',color:'var(--muted)',fontSize:'13px'}},'불러오는 중...'));
    else if(!S.articles.length)list.appendChild(h('div',{style:{textAlign:'center',padding:'50px'}},h('div',{style:{fontSize:'14px',fontWeight:'600',color:'var(--text3)'}},'뉴스가 없습니다'),h('div',{style:{fontSize:'12px',color:'var(--muted)',marginTop:'6px'}},'잠시 후 다시 시도해주세요')));
    else S.articles.forEach((a,i)=>list.appendChild(rCard(a,i)));
    app.appendChild(list);
  }
  if(S.tab==='search')app.appendChild(rSearch());
  if(S.tab==='trending')app.appendChild(rTrending());
  if(S.tab==='profile')app.appendChild(rProfile());
  if(!S.sel)app.appendChild(rNav());
}
loadArticles('전체');
initAuth();
</script>
</body>
</html>
